<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching - Omega-Roll</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .video-player-container { background: #000; width: 100%; aspect-ratio: 16/9; max-height: 550px; margin: 20px 0; border: 2px solid var(--neon-green); border-radius: 8px; overflow: hidden; position: relative;}
        video { width: 100%; height: 100%; object-fit: contain; }
        .control-bar { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-radius: 6px; border: 1px solid #222; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        select, .switch-btn { background: #000; color: #fff; border: 1px solid var(--neon-green); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .switch-btn.active { background: var(--neon-green); color: #000; }
        .pin-btn { background: #1f2833; border: 1px dashed var(--neon-green); color: var(--neon-green); padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .pin-btn:hover { background: var(--neon-green); color: #000; border-style: solid; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">Omega-Roll</a>
    <nav><a href="index.html">Home</a><a href="explore.html">Explore</a><a href="genres.html">Genres</a><a href="search.html">Search</a></nav>
</header>

<main class="container">
    <a id="back-to-anime" href="#" class="btn" style="display:inline-block; margin-bottom:20px; text-decoration:none;">< Back</a>

    <h2 id="video-title">Loading Episode...</h2>

    <div class="video-player-container" id="video-player-container">
    </div>

    <div class="control-bar">
        <div class="control-group">
            <label for="ep-picker" style="font-weight: bold; color: var(--grey);">Jump to Ep:</label>
            <select id="ep-picker"></select>
        </div>

        <div class="control-group">
            <button id="btn-sub" class="switch-btn active">SUB</button>
            <button id="btn-dub" class="switch-btn">DUB</button>
        </div>

        <div class="control-group">
            <button id="pin-episode-btn" class="pin-btn">📌 Pin Current Progress</button>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/watch.js"></script>
</body>
</html>
