<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard - Omega-Roll</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Base Container & Grid Adjustments */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .dashboard-section { 
            margin-bottom: 40px; 
            padding-top: 20px;
        }
        .dashboard-section h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #fff;
        }
        
        /* Grid Layouts */
        .pin-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .remove-continue-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(0,0,0,0.75);
            color: #fff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .anime-card:hover .remove-continue-btn {
            opacity: 1;
            transform: scale(1.05);
        }
        .remove-continue-btn:hover {
            background: rgba(255, 51, 51, 0.92);
            border-color: #ff3333;
        }
        .continue-pill {
            position: absolute;
            left: 16px;
            bottom: 16px;
            background: rgba(0,0,0,0.78);
            color: #fff;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(57,255,20,0.35);
            white-space: nowrap;
        }

        /* Card Structures */
        .pin-card { 
            background: #111111; 
            border: 1px solid #222;
            border-radius: 12px; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            position: relative;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .pin-card:hover {
            border-color: var(--neon-green);
        }
        .pin-card.no-poster {
            padding: 20px;
        }

        /* Stretch-proof Responsive Image Handling */
        .pin-card img { 
            width: 100%; 
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover; 
            background: #000;
        }
        
        /* Card Content Inner Spacing */
        .pin-card-content {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .pin-card h4 { 
            font-size: 16px; 
            margin: 0;
            color: #fff; 
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pin-card h4:hover {
            color: var(--neon-green);
        }
        .pin-card p { 
            font-size: 13px; 
            color: var(--grey); 
            margin: 0;
        }
        .pin-card small { 
            color: #666; 
            font-size: 12px; 
        }

        /* Minimalist Utility Action Toolbar */
        .pin-card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid #1a1a1a;
            background: #141414;
        }
        .pin-card.no-poster .pin-card-actions {
            padding: 12px 0 0 0;
            border-top: none;
            background: transparent;
        }
        
        /* Icon Button Mechanics */
        .icon-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .play-btn {
            color: #fff;
            background: var(--neon-green, #39ff14);
            color: #000;
            font-size: 12px;
            padding-left: 3px; /* Centers standard triangle play unicode */
        }
        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
        }
        .delete-btn {
            color: #ff3333;
            border: 1px solid rgba(255, 51, 51, 0.2);
        }
        .delete-btn:hover {
            background: #ff3333;
            color: #fff;
        }

        /* Search Filter Controls Row Layout */
        .controls-wrapper {
            display: flex; 
            gap: 12px; 
            align-items: center; 
            margin-bottom: 20px;
        }
        .controls-wrapper input, .controls-wrapper select {
            padding: 10px 14px; 
            border-radius: 8px; 
            border: 1px solid #222; 
            background: #111; 
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .controls-wrapper input:focus, .controls-wrapper select:focus {
            border-color: var(--neon-green);
        }
    </style>
</head>
<body>
<header></header>

<main class="container">
    <section class="dashboard-section">
        <h2>Continue Watching</h2>
        <div class="anime-grid" id="continue-watching-grid"></div>
    </section>

    <section class="dashboard-section">
        <h2>Pinned <span class="neon-title">Episode Progress</span></h2>
        <div class="pin-grid" id="pinned-episodes-grid"></div>
    </section>

    <section class="dashboard-section">
        <h2>My Saved <span class="neon-title">Anime Series</span></h2>
        <div class="controls-wrapper">
            <input id="wl-search" placeholder="Search saved..." style="flex: 1;" />
            <select id="wl-sort">
                <option value="added_desc">Added (new → old)</option>
                <option value="rating_desc">Rating (high → low)</option>
                <option value="rating_asc">Rating (low → high)</option>
                <option value="release_desc">Release (new → old)</option>
                <option value="episodes_desc">Episodes (many → few)</option>
            </select>
        </div>
        <div class="anime-grid" id="saved-anime-grid"></div>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/watch-later.js"></script>
</body>
</html>
