<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anime Details - CrunchyNeon</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-wrapper { display: flex; gap: 30px; margin-bottom: 40px; flex-wrap: wrap;}
        .details-poster { width: 300px; border-radius: 8px; border: 2px solid var(--neon-green); max-width: 100%;}
        .details-info { flex: 1; min-width: 300px; }
        .episode-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;}
        .episode-item a { display: block; background-color: var(--card-bg); padding: 15px; color: #fff; text-decoration: none; border-radius: 6px; border-left: 4px solid var(--neon-green); text-align: center; transition: 0.2s;}
        .episode-item a:hover { background-color: #2e3944; transform: scale(1.03); }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">CrunchyNeon</a>
    <nav><a href="index.html">Home</a><a href="explore.html">Explore</a><a href="search.html">Search</a></nav>
</header>

<main class="container">
    <div class="details-wrapper" id="anime-details">
    </div>

    <h2 style="border-bottom: 2px solid #222; padding-bottom: 10px;">Select <span class="neon-title">Episode</span></h2>
    <ul class="episode-list" id="episode-list">
    </ul>
</main>

<script src="js/api.js"></script>
<script src="js/anime.js"></script>
</body>
</html>
